<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){try{var t=localStorage.getItem("rl-theme");if(t!=="dark"&&t!=="light"){t=(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light"}document.documentElement.dataset.theme=t}catch(e){}})()</script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/organic-96dd4670-c283-46e7-a883-aab6ce3182e1/styles.css">
  <script src="_ds/organic-96dd4670-c283-46e7-a883-aab6ce3182e1/_ds_bundle.js"></script>
  <script src="rl-lib.js"></script>
  <style>
    html { background: var(--color-bg); }
    body { margin: 0; background: transparent; font-family: var(--font-body); }
    a { color: var(--color-accent-700); } a:hover { color: var(--color-accent-800); }
  </style>
</helmet>
<div style="font-family: var(--font-body); color: var(--color-text);">
  <sc-if value="{{ isTop }}" hint-placeholder-val="{{ true }}">
    <nav class="nav">
      <a href="Home.dc.html" style="text-decoration: none; color: var(--color-text); font-family: var(--font-heading); font-size: 19px;">The Little Book of RL</a>
      <span style="flex: 1;"></span>
      <span class="tag tag-neutral" style="white-space: nowrap;">{{ chapterLabel }}</span>
      <span class="tag tag-accent" style="white-space: nowrap;">{{ xpLabel }}</span>
      <a class="btn btn-ghost" href="Home.dc.html" style="text-decoration: none; white-space: nowrap;">← All chapters</a>
    </nav>
  </sc-if>
  <sc-if value="{{ isBottom }}" hint-placeholder-val="{{ false }}">
    <div style="background: var(--color-accent-2-100); border-radius: calc(2 * var(--radius-lg)); padding: 32px clamp(24px, 4vw, 48px); display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;">
      <div>
        <h3 style="font-family: var(--font-heading); font-weight: var(--font-heading-weight); font-size: 22px; margin: 0;">{{ doneTitle }}</h3>
        <p style="font-size: 14.5px; line-height: 1.55; color: color-mix(in srgb, var(--color-text) 78%, transparent); margin: 8px 0 0; max-width: 52ch;">{{ doneSub }}</p>
      </div>
      <button class="btn btn-primary" onClick="{{ complete }}" disabled="{{ doneAlready }}" style="white-space: nowrap;">{{ doneLabel }}</button>
    </div>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr)); gap: 20px; margin-top: 24px;">
      <sc-if value="{{ hasPrev }}" hint-placeholder-val="{{ true }}">
        <a href="{{ prevHref }}" style="text-decoration: none; color: var(--color-text); background: var(--color-neutral-100); border-radius: calc(2 * var(--radius-lg)); padding: 22px 26px; box-shadow: var(--shadow-sm);" style-hover="box-shadow: var(--shadow-md);">
          <div style="font-size: 12.5px; letter-spacing: .06em; text-transform: uppercase; font-weight: 600; color: var(--color-neutral-600);">← Previous</div>
          <div style="font-family: var(--font-heading); font-size: 19px; margin-top: 6px;">{{ prevTitle }}</div>
        </a>
      </sc-if>
      <sc-if value="{{ hasNext }}" hint-placeholder-val="{{ true }}">
        <a href="{{ nextHref }}" style="text-decoration: none; color: var(--color-text); background: var(--color-accent-100); border-radius: calc(2 * var(--radius-lg)); padding: 22px 26px; text-align: right;" style-hover="background: var(--color-accent-200);">
          <div style="font-size: 12.5px; letter-spacing: .06em; text-transform: uppercase; font-weight: 600; color: var(--color-accent-700);">Up next →</div>
          <div style="font-family: var(--font-heading); font-size: 19px; margin-top: 6px;">{{ nextTitle }}</div>
        </a>
      </sc-if>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1100, &quot;height&quot;: 320}, &quot;chapter&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;ch1&quot;, &quot;options&quot;: [&quot;ch1&quot;, &quot;ch2&quot;, &quot;ch3&quot;, &quot;ch4&quot;, &quot;ch5&quot;, &quot;ch6&quot;, &quot;ch7&quot;, &quot;ch8&quot;, &quot;ch9&quot;, &quot;ch10&quot;, &quot;ch11&quot;, &quot;ch12&quot;], &quot;tsType&quot;: &quot;string&quot;}, &quot;pos&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;top&quot;, &quot;options&quot;: [&quot;top&quot;, &quot;bottom&quot;], &quot;tsType&quot;: &quot;'top'|'bottom'&quot;}}">
class Component extends DCLogic {
  componentDidMount() {
    this.onChange = () => this.forceUpdate();
    window.addEventListener('rl:change', this.onChange);
    if (!window.RL) {
      this._t = setInterval(() => { if (window.RL) { clearInterval(this._t); this.forceUpdate(); } }, 80);
    }
  }
  componentWillUnmount() {
    window.removeEventListener('rl:change', this.onChange);
    if (this._t) clearInterval(this._t);
  }
  renderVals() {
    const RL = window.RL;
    const pos = this.props.pos ?? 'top';
    const id = this.props.chapter ?? 'ch1';
    if (!RL) return { isTop: pos === 'top', isBottom: pos === 'bottom', n: '', xp: 0, levelName: '', hasPrev: false, hasNext: false, doneTitle: '', doneSub: '', doneLabel: '', doneAlready: false };
    const idx = RL.CHAPTERS.findIndex((c) => c.id === id);
    const ch = RL.CHAPTERS[idx] || {};
    const prev = RL.CHAPTERS[idx - 1], next = RL.CHAPTERS[idx + 1];
    const lvl = RL.levelInfo();
    const done = RL.lessonDone(id);
    return {
      isTop: pos === 'top', isBottom: pos === 'bottom',
      n: ch.n, xp: lvl.xp, levelName: lvl.name,
      chapterLabel: 'Chapter ' + ch.n + ' of ' + RL.CHAPTERS.length,
      xpLabel: lvl.xp + ' XP \u00b7 ' + lvl.name,
      doneTitle: done ? 'Chapter read — nicely done.' : 'Done with this chapter?',
      doneSub: done ? 'The lesson is marked complete. Retake the quiz any time to raise your best score.' : 'Mark the lesson complete for +50 XP once you have been through the sections, the quiz and the cards.',
      doneLabel: done ? '✓ Lesson complete' : 'Mark lesson complete (+50 XP)',
      doneAlready: done,
      complete: () => RL.completeLesson(id),
      hasPrev: !!prev, prevHref: prev ? prev.file : '', prevTitle: prev ? prev.n + '. ' + prev.title : '',
      hasNext: !!next, nextHref: next ? next.file : '', nextTitle: next ? next.n + '. ' + next.title : ''
    };
  }
}

</script>
</body>
</html>
